# this is to prevent cold starts (hugging face spaces sleeps after 48 hours of inactivity with free tier)

name: Ping Hugging Face Spaces

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Spaces
        run: |
          
          # some debugging flags to check whether pings are working fine or not
          curl -L -o /dev/null -s -w "HTTP Status: %{http_code}\n" \
          https://ze19n-sow-smart-backend.hf.space/